<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" preserveAspectRatio="xMidYMid slice" role="img" aria-labelledby="title desc">
  <title id="title">Edge of (Stochastic) Stability made simple</title>
  <desc id="desc">Animated cover using the GIF from the post.</desc>
  <defs>
    <linearGradient id="fade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#0f172a" stop-opacity="0.6"/>
    </linearGradient>
    <linearGradient id="frame" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#e2e8f0" stop-opacity="0.9"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="#0f172a"/>
  <image href="/blog-assets/edge-of-stochastic-stability-part-I/assets/gif_GD.gif" x="0" y="0" width="1200" height="630" preserveAspectRatio="xMidYMid slice"/>
  <rect width="1200" height="630" fill="url(#fade)"/>

  <g transform="translate(70,70)">
    <rect x="0" y="0" width="1060" height="490" rx="28" fill="none" stroke="url(#frame)" stroke-width="2"/>
  </g>

  <g transform="translate(90,430)">
    <rect x="0" y="0" width="320" height="56" rx="28" fill="#ffffff" fill-opacity="0.12" stroke="#ffffff" stroke-opacity="0.4"/>
    <text x="26" y="36" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="600" fill="#ffffff">
      Part I
    </text>
  </g>
</svg>
