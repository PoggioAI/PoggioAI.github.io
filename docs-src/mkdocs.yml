site_name: PoggioAI MSc Documentation
site_url: https://poggioai.github.io/docs/
site_description: Setup and usage guide for PoggioAI MSc
repo_url: https://github.com/PoggioAI/PoggioAI_MSc/tree/MSc_Prod
repo_name: PoggioAI/PoggioAI_MSc

theme:
  name: material
  palette:
    scheme: default
    primary: white
    accent: indigo
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.instant
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - toc.follow

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Configuration: configuration.md
  - Usage: usage.md
  - HPC / SLURM Setup: setup.md

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.keys
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

extra_javascript:
  - https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js
  - https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js

extra_css:
  - https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css

extra:
  homepage: https://poggioai.github.io
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/PoggioAI/PoggioAI_MSc/tree/MSc_Prod
    - icon: fontawesome/brands/discord
      link: https://discord.gg/qSb23gTD
